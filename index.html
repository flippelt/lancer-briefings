<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/icons/pwa-icon.svg" />
		<link rel="apple-touch-icon" href="/icons/pwa-icon.svg" />
		<meta name="theme-color" content="#991e2a" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta property="og:type" content="website" />
    <meta property="og:url" content="https://contrafatores.netlify.app/">
    <meta property="og:title" content="UN Relatório de Missões">
    <meta property="og:description" content="UN | RELATÓRIO DE MISSÕES">
    <meta property="og:image" content="/icons/pwa-icon.svg">
    <title>UN | CENTRAL DE CONTROLE</title>
	</head>

	<body style="margin: 0px">
		<div id="app"></div>
		<!-- Three.js and Vanta need to load before App.vue's mounted() hook
		     calls VANTA.GLOBE(). The actual init (and its mode-aware config)
		     lives in App.vue so the globe can be rebuilt when the user
		     toggles light/dark in the Settings modal. -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
		<script type="module" src="/src/assets/scripts/vanta.globe.min.js"></script>
		<script type="module" src="/src/main.js"></script>

		<!-- Netlify Identity widget: only enables the "Login" prompt that
		     Decap CMS needs when the user lands on /admin/ from a fresh
		     auth invite email. The bootstrap below redirects newly logged-
		     in users to /admin/ so they don't end up stuck on the briefing
		     page after clicking the email confirmation link. -->
		<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
		<script>
			if (window.netlifyIdentity) {
				window.netlifyIdentity.on("init", (user) => {
					if (!user) {
						window.netlifyIdentity.on("login", () => {
							document.location.href = "/admin/";
						});
					}
				});
			}
		</script>
	</body>
</html>
